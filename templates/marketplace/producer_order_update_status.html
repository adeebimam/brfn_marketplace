{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Update Order Status</h1>

  <p><strong>Order:</strong> #{{ po.order.id }}</p>
  <p><strong>Current Status:</strong> {{ po.get_status_display }}</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save Status Update</button>
  </form>

  <p style="margin-top: 16px;">
    <a href="{% url 'marketplace:producer_order_detail' po.pk %}">← Back to Order Detail</a>
  </p>
</div>
{% endblock %}
