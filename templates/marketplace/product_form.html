{% extends "base.html" %}
{% block content %}
  <h1>{% if mode == "create" %}Create{% else %}Edit{% endif %} Product</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="save-btn btn" type="submit">Save</button>
    <button class="back-btn btn" type="button" onclick="window.history.back();">Back</button>
  </form>
{% endblock %}
