{% extends "base.html" %}
{% block content %}

<h2>Write Purchase Review</h2>

<div style="border:1px solid #ddd; border-radius:12px; background:#fff; padding:20px; max-width:700px;">
  <p><strong>Order:</strong> {{ order.order_number }}</p>

  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
      Submit Purchase Review
    </button>

    <a href="{% url 'marketplace:order_detail' order.order_number %}" class="btn">
      Cancel
    </a>
  </form>
</div>

{% endblock %}
