{% extends "base.html" %}
{% block content %}
  <div class="card stack">
    <h1>{{ product.name }}</h1>

    <div class="badge">
      {% if product.category %}
        {{ product.category.name }}
      {% endif %}
    </div>

    <p class="muted">
      Sold by: <strong>{{ product.producer.username }}</strong>
    </p>

    <p>{{ product.description }}</p>

    <p class="price">£{{ product.price }}</p>
    <p>Stock: {{ product.stock_quantity }}</p>

    <a class="btn" href="{% url 'marketplace:product_list' %}">Back</a>
  </div>
{% endblock %}
