{% extends "base.html" %}
{% block content %}



  <div class="card stack">
    <h1>{{ product.name }}</h1>

    <div class="badge">
      {% if product.category %}
        {{ product.category.name }}
      {% endif %}
    </div>

    <p class="muted">
      Sold by: <strong>{{ product.producer.username }}</strong>
    </p>

    <p>{{ product.description }}</p>

    <p class="price">£{{ product.price }}</p>
    <p>Stock: {{ product.stock_quantity }}</p>

    <!-- Add to cart form with quantity input -->
    <form method="post" action="{% url 'cart:add' product.id %}">
      {% csrf_token %}
      <label for="qty">Quantity:</label>
      <input type="number" id="qty" name="qty" value="1" min="1" max="{{ product.stock_quantity }}" style="width:70px; margin-right:10px;">
      <button type="submit" class="btn" style="display:block; width:100%;">
        Add to Cart
      </button>
    </form>

    <a class="btn" href="{% url 'marketplace:product_list' %}">Back</a>
  </div>
{% endblock %}
