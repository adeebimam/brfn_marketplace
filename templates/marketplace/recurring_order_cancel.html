{% extends "base.html" %}
{% block content %}
<div style="max-width:500px; margin:40px auto; padding:20px; text-align:center;">
  <h2>Cancel Recurring Order</h2>
  <p>Are you sure you want to cancel <strong>{{ recurring_order.name|default:"this recurring order" }}</strong>?</p>
  <p style="color:#666;">This cannot be undone. Future orders will not be generated.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" style="background:#dc3545; color:white; padding:10px 24px; border:none; border-radius:6px; cursor:pointer; font-size:1em;">
      Yes, Cancel
    </button>
    <a href="{% url 'marketplace:recurring_order_list' %}"
       style="margin-left:12px; color:#666; text-decoration:none;">Go Back</a>
  </form>
</div>
{% endblock %}
