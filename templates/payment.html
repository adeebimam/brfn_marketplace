{% extends "base.html" %}
{% block content %}
<h1>Payment</h1>

<p>Total: £{{ total }}</p>

<form method="POST">
{% csrf_token %}

<label>Card Number</label><br>
<input type="text" placeholder="4242 4242 4242 4242"><br><br>

<label>Expiry</label><br>
<input type="text" placeholder="12/34"><br><br>

<label>CVC</label><br>
<input type="text" placeholder="123"><br><br>

<button type="submit">Confirm Payment</button>

</form>
{% endblock %}
