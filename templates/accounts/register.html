{% extends "base.html" %}
{% block content %}
  <div class="card stack">
    <h1>Register</h1>

    <form method="post" class="stack">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Create account</button>
    </form>

    <p class="muted">Already registered? <a href="{% url 'accounts:login' %}">Login</a></p>
  </div>
{% endblock %}
