{% extends "base.html" %}
{% block content %}
  <div class="card stack">
    <h1>Register</h1>

    <form method="post" class="stack">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit" style="font-size: large;">Create account</button>
    </form>

    <p class="muted">Already registered? <a href="{% url 'accounts:login' %}" class="login-register-link">Login</a></p>
    <p class="muted">Producer registration? <a href="{% url 'accounts:producer_register' %}" class="login-register-link">Register</a></p>

  </div>
{% endblock %}
