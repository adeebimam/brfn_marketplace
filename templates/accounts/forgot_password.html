{% extends "base.html" %}
{% block content %}
<div class="card stack" style="max-width:400px; margin:0 auto;">
  <h1>Forgot Password</h1>
  <p class="muted">Enter your email address and we'll let you reset your password.</p>

  <form method="POST" class="stack">
    {% csrf_token %}
    <div>
      <label style="font-weight:600; display:block; margin-bottom:6px;">Email Address</label>
      <input
        type="email"
        name="email"
        required
        placeholder="your@email.com"
        style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;"
      >
    </div>
    <button type="submit" class="btn btn-primary">Continue</button>
  </form>

  <p class="muted">Remembered your password? <a href="{% url 'accounts:login' %}" class="login-register-link">Login</a></p>
</div>
{% endblock %}
