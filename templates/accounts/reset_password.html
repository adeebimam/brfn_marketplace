{% extends "base.html" %}
{% block content %}
<div class="card stack" style="max-width:400px; margin:0 auto;">
  <h1>Reset Password</h1>
  <p class="muted">Enter a new password for <strong>{{ user.email }}</strong>.</p>

  <form method="POST" class="stack">
    {% csrf_token %}
    <div>
      <label style="font-weight:600; display:block; margin-bottom:6px;">New Password</label>
      <div style="position:relative;">
        <input type="password" name="new_password1" required id="new_password1"
          style="width:100%; padding:10px; padding-right:40px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
        <button type="button" onclick="togglePassword('new_password1', this)"
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#6b7280;">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>
    <div>
      <label style="font-weight:600; display:block; margin-bottom:6px;">Confirm New Password</label>
      <div style="position:relative;">
        <input type="password" name="new_password2" required id="new_password2"
          style="width:100%; padding:10px; padding-right:40px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
        <button type="button" onclick="togglePassword('new_password2', this)"
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#6b7280;">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Reset Password</button>
  </form>
</div>

<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector("i");
  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>
{% endblock %}
