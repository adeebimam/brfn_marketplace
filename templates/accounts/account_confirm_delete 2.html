{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Delete Account</h1>

  <p>
    Are you sure you want to delete
    <strong>{{ profile.user.username }}</strong>?
  </p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-admin-danger">
      Yes, Delete Account
    </button>

    <a href="{% url 'accounts:account_detail' profile.id %}" class="btn back-btn">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
