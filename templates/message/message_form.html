{% extends "base.html" %}

{% block content %}
<div class="card">
  <h1>Start New Message</h1>

  <p>Create a new conversation with another user.</p>

  <form method="post" class="stack">
    {% csrf_token %}

    {{ form.as_p }}

    <p>
      <button class="btn save-btn" type="submit">
        Send Message
      </button>

      <a class="btn" href="{% url 'message:inbox' %}">
        Back to Inbox
      </a>
    </p>
  </form>
</div>
{% endblock %}
